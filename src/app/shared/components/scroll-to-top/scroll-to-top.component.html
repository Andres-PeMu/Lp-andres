@if (isVisible()) {
  <button
    type="button"
    (click)="scrollToTop()"
    class="fixed bottom-8 right-8 z-50 w-12 h-12 bg-primary text-white rounded-full shadow-lg hover:bg-primary-dark transition-all transform hover:scale-110 flex items-center justify-center group animate-fade-in-up"
    aria-label="Scroll to top"
  >
    <svg
      class="w-6 h-6 transform group-hover:-translate-y-1 transition-transform"
      fill="none"
      stroke="currentColor"
      viewBox="0 0 24 24"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M5 10l7-7m0 0l7 7m-7-7v18"
      />
    </svg>
  </button>
}
