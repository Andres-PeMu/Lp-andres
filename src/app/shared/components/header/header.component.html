<header
  class="fixed top-0 left-0 right-0 z-50 transition-all duration-300"
  [class.bg-white]="isScrolled()"
  [class.bg-white/95]="isScrolled()"
  [class.backdrop-blur-sm]="isScrolled()"
  [class.border-b]="isScrolled()"
  [class.border-border]="isScrolled()"
  [class.shadow-sm]="isScrolled()"
>
  <nav class="container mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16 md:h-20">
      <!-- Logo / Nombre -->
      <div class="flex-shrink-0">
        <a
          href="#hero"
          (click)="scrollToSection('hero'); $event.preventDefault()"
          class="text-lg md:text-xl font-bold text-text-primary hover:text-primary transition-colors tracking-tight"
        >
          AFPM
        </a>
      </div>

      <!-- Desktop Navigation -->
      <div class="hidden md:flex md:items-center md:space-x-1">
        @for (item of navItems; track item.href) {
          <a
            href="{{ item.href }}"
            (click)="scrollToSection(item.href.substring(1)); $event.preventDefault()"
            class="px-4 py-2 text-sm font-medium text-text-secondary hover:text-text-primary transition-colors rounded-md"
          >
            {{ item.label }}
          </a>
        }
      </div>

      <!-- CTA Button Desktop -->
      <div class="hidden md:flex md:items-center">
        <button
          type="button"
          (click)="scrollToSection('contact')"
          class="px-5 py-2 bg-text-primary text-white rounded-md font-medium hover:bg-primary-dark transition-colors text-sm"
        >
          Contáctame
        </button>
      </div>

      <!-- Mobile menu button -->
      <button
        type="button"
        (click)="toggleMobileMenu()"
        class="md:hidden p-2 rounded-lg text-text-primary hover:bg-background-alt transition-colors"
        [attr.aria-expanded]="isMobileMenuOpen()"
        aria-label="Toggle menu"
      >
        @if (!isMobileMenuOpen()) {
          <svg
            class="w-6 h-6"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16"
            />
          </svg>
        } @else {
          <svg
            class="w-6 h-6"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M6 18L18 6M6 6l12 12"
            />
          </svg>
        }
      </button>
    </div>

    <!-- Mobile Navigation -->
    @if (isMobileMenuOpen()) {
      <div
        class="md:hidden py-4 space-y-2 border-t border-gray-200 mt-2 animate-fade-in-down"
      >
        @for (item of navItems; track item.href) {
          <a
            href="{{ item.href }}"
            (click)="scrollToSection(item.href.substring(1)); $event.preventDefault()"
            class="block px-4 py-3 text-base font-medium text-text-secondary hover:text-primary hover:bg-background-alt rounded-lg transition-colors"
          >
            {{ item.label }}
          </a>
        }
        <button
          type="button"
          (click)="scrollToSection('contact')"
          class="w-full mt-4 px-6 py-3 bg-primary text-white rounded-lg font-semibold hover:bg-primary-dark transition-colors"
        >
          Contáctame
        </button>
      </div>
    }
  </nav>
</header>
