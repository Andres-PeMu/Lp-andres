<section
  id="technologies"
  class="py-20 md:py-32 bg-background-alt px-4 sm:px-6 lg:px-8"
>
  <div class="container mx-auto max-w-6xl">
    <!-- Section Header -->
    <div appScrollAnimation class="text-center mb-16 animate-on-scroll">
      <h2
        class="text-3xl md:text-4xl lg:text-5xl font-bold text-text-primary mb-4"
      >
        Tecnologías <span class="gradient-text">Principales</span>
      </h2>
      <p class="text-lg text-text-secondary max-w-2xl mx-auto">
        Stack tecnológico con el que trabajo día a día para construir soluciones de calidad
      </p>
    </div>

    <!-- Technologies Grid -->
    <div
      appScrollAnimation
      class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-7 gap-6 md:gap-8 animate-on-scroll"
    >
      @for (tech of technologies; track tech.name; let i = $index) {
        <div
          class="flex flex-col items-center justify-center p-4 md:p-6 bg-white rounded-xl shadow-md hover:shadow-xl transition-all group"
          [style.animation-delay]="i * 0.05 + 's'"
        >
          <div
            class="w-14 h-14 md:w-16 md:h-20 mb-3 md:mb-4 flex items-center justify-center group-hover:scale-110 transition-transform"
          >
            @if (tech.icon) {
              <img
                [src]="tech.icon"
                [alt]="tech.name"
                class="w-full h-full object-contain"
              />
            } @else {
              <div
                class="w-full h-full rounded-lg bg-gradient-to-br from-primary/10 to-accent/10 flex items-center justify-center text-2xl md:text-3xl font-bold text-primary border-2 border-primary/20"
              >
                {{ tech.name.charAt(0) }}
              </div>
            }
          </div>
          <span class="text-xs md:text-sm font-semibold text-text-primary text-center">
            {{ tech.name }}
          </span>
        </div>
      }
    </div>
  </div>
</section>
