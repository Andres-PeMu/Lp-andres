<!-- Hero Section -->
<section
  id="hero"
  class="relative min-h-screen flex items-center justify-center overflow-hidden bg-gradient-to-br from-background via-blue-50/30 to-cyan-50/20 px-4 py-20"
>
  <!-- Background decoration alegre y profesional -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <!-- Gradientes suaves y luminosos -->
    <div
      class="absolute top-1/4 right-1/4 w-[500px] h-[500px] bg-primary/10 rounded-full blur-3xl animate-pulse"
      style="animation-duration: 4s;"
    ></div>
    <div
      class="absolute bottom-1/4 left-1/4 w-[400px] h-[400px] bg-accent/10 rounded-full blur-3xl animate-pulse"
      style="animation-duration: 5s; animation-delay: 1s;"
    ></div>
    <div
      class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-primary/5 rounded-full blur-3xl"
    ></div>
    
    <!-- Patrón de grid sutil -->
    <div class="absolute inset-0 opacity-[0.02]" style="background-image: linear-gradient(rgba(59, 130, 246, 0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(59, 130, 246, 0.1) 1px, transparent 1px); background-size: 50px 50px;"></div>
  </div>

  <div class="max-w-5xl mx-auto text-center relative z-10">
    <!-- Greeting alegre -->
    <p
      appScrollAnimation
      class="text-sm md:text-base text-primary font-semibold mb-6 animate-on-scroll uppercase tracking-wider"
    >
      👋 Hola, soy
    </p>

    <!-- Main Heading - Más energético pero profesional -->
    <h1
      appScrollAnimation
      class="text-5xl sm:text-6xl md:text-7xl lg:text-8xl font-bold mb-8 animate-on-scroll leading-tight"
      style="animation-delay: 0.1s"
    >
      <span class="block mb-3 text-text-primary">Andrés Felipe</span>
      <span class="block mb-4 text-text-primary">Peña Muñoz</span>
      <span class="block text-4xl sm:text-5xl md:text-6xl lg:text-7xl gradient-text">
        Senior Fullstack Engineer
      </span>
    </h1>

    <!-- Subtitle con más energía -->
    <p
      appScrollAnimation
      class="text-xl md:text-2xl lg:text-3xl text-text-primary max-w-3xl mx-auto mb-6 font-medium animate-on-scroll leading-relaxed"
      style="animation-delay: 0.2s"
    >
      Especializado en <span class="font-bold text-primary">Angular</span> y <span class="font-bold text-primary">Node.js</span>
    </p>

    <!-- Description más atractiva -->
    <p
      appScrollAnimation
      class="text-lg md:text-xl text-text-secondary max-w-2xl mx-auto mb-12 leading-relaxed animate-on-scroll"
      style="animation-delay: 0.3s"
    >
      Desarrollo aplicaciones web <span class="font-semibold text-text-primary">escalables</span>, <span class="font-semibold text-text-primary">mantenibles</span> y orientadas a negocio para entornos empresariales.
    </p>

    <!-- CTA Buttons - Más atractivos y energéticos -->
    <div
      appScrollAnimation
      class="flex flex-col sm:flex-row gap-4 justify-center items-center animate-on-scroll"
      style="animation-delay: 0.4s"
    >
      <button
        type="button"
        (click)="scrollToSection('contact')"
        class="group px-8 py-4 bg-primary text-white rounded-lg font-semibold hover:bg-primary-dark transition-all shadow-lg hover:shadow-xl transform hover:scale-105 flex items-center gap-2"
      >
        <span>Contáctame</span>
        <svg
          class="w-5 h-5 transform group-hover:translate-x-1 transition-transform"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M13 7l5 5m0 0l-5 5m5-5H6"
          />
        </svg>
      </button>
      <button
        type="button"
        (click)="scrollToSection('projects')"
        class="px-8 py-4 border-2 border-primary text-primary rounded-lg font-semibold hover:bg-primary hover:text-white transition-all transform hover:scale-105 shadow-sm hover:shadow-md"
      >
        Ver Proyectos
      </button>
    </div>

    <!-- Stats / Quick Info - Más atractivo -->
    <div
      appScrollAnimation
      class="grid grid-cols-3 gap-8 mt-20 max-w-2xl mx-auto animate-on-scroll border-t border-border/50 pt-12"
      style="animation-delay: 0.5s"
    >
      <div class="text-center group">
        <div class="text-4xl md:text-5xl font-bold text-primary mb-2 group-hover:scale-110 transition-transform">5+</div>
        <div class="text-sm text-text-secondary font-medium">Años de Experiencia</div>
      </div>
      <div class="text-center group">
        <div class="text-4xl md:text-5xl font-bold text-primary mb-2 group-hover:scale-110 transition-transform">50+</div>
        <div class="text-sm text-text-secondary font-medium">Proyectos Completados</div>
      </div>
      <div class="text-center group">
        <div class="text-4xl md:text-5xl font-bold text-primary mb-2 group-hover:scale-110 transition-transform">100%</div>
        <div class="text-sm text-text-secondary font-medium">Comprometido</div>
      </div>
    </div>
  </div>

  <!-- Scroll indicator -->
  <div
    class="absolute bottom-8 left-1/2 transform -translate-x-1/2 animate-bounce cursor-pointer"
    (click)="scrollToSection('about')"
    appScrollAnimation
    role="button"
    tabindex="0"
    (keydown.enter)="scrollToSection('about')"
    aria-label="Scroll to about section"
  >
    <div class="flex flex-col items-center gap-2 text-primary hover:text-primary-dark transition-colors">
      <span class="text-xs font-semibold uppercase tracking-wider">Scroll</span>
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M19 14l-7 7m0 0l-7-7m7 7V3"
        />
      </svg>
    </div>
  </div>
</section>

<!-- About Section -->
<app-about />

<!-- Projects Section (Experiencia Destacada) -->
<app-projects />

<!-- Skills Section -->
<app-skills />

<!-- Contact Section -->
<app-contact />
